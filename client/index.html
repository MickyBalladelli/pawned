<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vela MMO Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .app-container {
            display: flex;
            gap: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .channels-panel {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            max-width: 300px;
        }

        .messages-panel {
            flex: 3;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            height: 600px;
        }

        .panel-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #4a90e2;
        }

        .channel-list {
            list-style: none;
        }

        .channel-item {
            padding: 12px 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .channel-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }

        .channel-item.active {
            background: rgba(74, 144, 226, 0.5);
            border-left: 4px solid #4a90e2;
        }

        .channel-name {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .channel-description {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        .channel-private {
            color: #ff6b6b;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .message-username {
            font-weight: bold;
            color: #4a90e2;
        }

        .message-time {
            opacity: 0.7;
        }

        .message-content {
            line-height: 1.4;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        #message-input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 25px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 1rem;
        }

        #message-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        #send-button {
            padding: 12px 25px;
            border-radius: 25px;
            border: none;
            background: #4a90e2;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #send-button:hover {
            background: #357abd;
            transform: scale(1.05);
        }

        .admin-panel {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        .admin-form {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .admin-form input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 25px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .admin-form button {
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            background: #ff6b6b;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .admin-form button:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        .status-bar {
            text-align: center;
            padding: 10px;
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }

        .channel-actions {
            display: flex;
            gap: 5px;
        }

        .channel-actions button {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 5px;
        }

        .channel-actions button:hover {
            color: #ff5252;
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }
            
            .channels-panel {
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-gamepad"></i> Vela MMO Chat</h1>
            <p class="subtitle">Real-time communication for the Vela MMO experience</p>
        </header>

        <div class="app-container">
            <div class="channels-panel">
                <h2 class="panel-title"><i class="fas fa-comments"></i> Channels</h2>
                <ul class="channel-list" id="channel-list">
                    <!-- Channels will be populated here -->
                </ul>
                
                <div class="admin-panel">
                    <h3 class="panel-title"><i class="fas fa-user-shield"></i> Admin Panel</h3>
                    <div class="admin-form">
                        <input type="text" id="channel-name" placeholder="Channel name">
                        <input type="text" id="channel-description" placeholder="Description">
                        <button id="create-channel-btn"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>

            <div class="messages-panel">
                <h2 class="panel-title" id="current-channel">Select a channel</h2>
                <div class="messages-container" id="messages-container">
                    <!-- Messages will be populated here -->
                </div>
                <div class="input-area">
                    <input type="text" id="message-input" placeholder="Type your message...">
                    <button id="send-button"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <p>Connected to Vela server | <span id="user-count">0</span> users online</p>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Connect to the server
        const socket = io();
        
        // DOM Elements
        const channelList = document.getElementById('channel-list');
        const messagesContainer = document.getElementById('messages-container');
        const currentChannelElement = document.getElementById('current-channel');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const createChannelBtn = document.getElementById('create-channel-btn');
        const channelNameInput = document.getElementById('channel-name');
        const channelDescriptionInput = document.getElementById('channel-description');
        const userCountElement = document.getElementById('user-count');
        
        // Current state
        let currentChannel = null;
        let currentUser = null;
        
        // Initialize the app
        function init() {
            // Get user information (for demo purposes)
            currentUser = {
                id: Math.floor(Math.random() * 1000),
                username: 'Player' + Math.floor(Math.random() * 100)
            };
            
            // Load channels
            loadChannels();
            
            // Set up event listeners
            setupEventListeners();
        }
        
        // Load all channels
        function loadChannels() {
            fetch('/api/channels')
                .then(response => response.json())
                .then(channels => {
                    renderChannels(channels);
                })
                .catch(error => {
                    console.error('Error loading channels:', error);
                });
        }
        
        // Render channels in the UI
        function renderChannels(channels) {
            channelList.innerHTML = '';
            
            channels.forEach(channel => {
                const channelElement = document.createElement('li');
                channelElement.className = 'channel-item';
                channelElement.dataset.id = channel.id;
                
                channelElement.innerHTML = `
                    <div>
                        <div class="channel-name">${channel.name}</div>
                        <div class="channel-description">${channel.description || 'No description'}</div>
                        ${channel.is_private ? '<span class="channel-private"><i class="fas fa-lock"></i> Private</span>' : ''}
                    </div>
                    <div class="channel-actions">
                        ${channel.is_private ? '<button class="join-btn"><i class="fas fa-lock"></i></button>' : ''}
                    </div>
                `;
                
                channelElement.addEventListener('click', () => {
                    joinChannel(channel.id);
                });
                
                channelList.appendChild(channelElement);
            });
        }
        
        // Join a channel
        function joinChannel(channelId) {
            if (currentChannel) {
                socket.emit('leaveChannel', currentChannel);
            }
            
            currentChannel = channelId;
            socket.emit('joinChannel', channelId);
            
            // Update UI
            document.querySelectorAll('.channel-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`.channel-item[data-id="${channelId}"]`).classList.add('active');
            
            currentChannelElement.textContent = `Channel: ${document.querySelector(`.channel-item[data-id="${channelId}"] .channel-name`).textContent}`;
            
            // Load messages for this channel
            loadMessages(channelId);
        }
        
        // Load messages for a channel
        function loadMessages(channelId) {
            fetch(`/api/channels/${channelId}/messages?limit=50`)
                .then(response => response.json())
                .then(messages => {
                    renderMessages(messages);
                })
                .catch(error => {
                    console.error('Error loading messages:', error);
                });
        }
        
        // Render messages in the UI
        function renderMessages(messages) {
            messagesContainer.innerHTML = '';
            
            messages.forEach(message => {
                const messageElement = document.createElement('div');
                messageElement.className = 'message';
                
                const timestamp = new Date(message.created_at);
                const timeString = timestamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                messageElement.innerHTML = `
                    <div class="message-header">
                        <span class="message-username">${message.username}</span>
                        <span class="message-time">${timeString}</span>
                    </div>
                    <div class="message-content">${message.content}</div>
                `;
                
                messagesContainer.appendChild(messageElement);
            });
            
            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // Set up event listeners
        function setupEventListeners() {
            // Send message
            sendButton.addEventListener('click', sendMessage);
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
            
            // Create new channel
            createChannelBtn.addEventListener('click', createChannel);
            
            // Socket events
            socket.on('receiveMessage', (message) => {
                if (message.channel_id === currentChannel) {
                    renderMessages([message]);
                }
            });
            
            socket.on('channelCreated', (channel) => {
                loadChannels();
            });
            
            socket.on('channelUpdated', (channel) => {
                loadChannels();
            });
            
            socket.on('channelDeleted', (channelId) => {
                loadChannels();
                if (currentChannel === channelId) {
                    currentChannel = null;
                    currentChannelElement.textContent = 'Select a channel';
                    messagesContainer.innerHTML = '';
                }
            });
            
            socket.on('userCount', (count) => {
                userCountElement.textContent = count;
            });
        }
        
        // Send a message
        function sendMessage() {
            if (!currentChannel || !messageInput.value.trim()) return;
            
            const message = {
                channelId: currentChannel,
                userId: currentUser.id,
                message: messageInput.value.trim()
            };
            
            socket.emit('sendMessage', message);
            messageInput.value = '';
        }
        
        // Create a new channel
        function createChannel() {
            const name = channelNameInput.value.trim();
            const description = channelDescriptionInput.value.trim();
            
            if (!name) return;
            
            fetch('/api/channels', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name,
                    description,
                    is_private: false
                })
            })
            .then(response => response.json())
            .then(channel => {
                channelNameInput.value = '';
                channelDescriptionInput.value = '';
                loadChannels();
            })
            .catch(error => {
                console.error('Error creating channel:', error);
            });
        }
        
        // Initialize the app when the page loads
        window.addEventListener('load', init);
    </script>
</body>
</html>

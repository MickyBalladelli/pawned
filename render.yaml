services:
  - type: web
    name: pawned
    runtime: node
    buildCommand: npm --prefix client install --include=dev && npm --prefix server install && npm --prefix client run build
    startCommand: npm --prefix server start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
